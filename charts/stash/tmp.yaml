# Source: stash/charts/stash-enterprise/templates/cleaner/job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: release-name-stash-enterprise-cleaner
  namespace: stash
  labels:
    helm.sh/chart: stash-enterprise-v0.39.0
    app.kubernetes.io/name: stash-enterprise
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "v0.39.1"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    spec:
      imagePullSecrets:
        []
      serviceAccountName: release-name-stash-enterprise-cleaner
      containers:
      - name: busybox
        image: ghcr.io/appscode/kubectl-nonroot:1.31
        command:
          - sh
          - -c
          - "sleep 2; \
           kubectl delete job release-name-stash-enterprise-crd-installer -n stash || true; \
           kubectl delete functions.stash.appscode.com update-status pvc-backup pvc-restore || true; \
           kubectl delete tasks.stash.appscode.com pvc-backup pvc-restore || true;"
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          seccompProfile:
            type: RuntimeDefault
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/os: linux
---
# Source: stash/charts/stash-enterprise/templates/crd-installer/job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: release-name-stash-enterprise-crd-installer
  namespace: stash
  labels:
    helm.sh/chart: stash-enterprise-v0.39.0
    app.kubernetes.io/name: stash-enterprise
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "v0.39.1"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,pre-rollback
    "helm.sh/hook-delete-policy": before-hook-creation,hook-failed
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 10
  template:
    spec:
      imagePullSecrets:
        []
      serviceAccountName: release-name-stash-enterprise-crd-installer
      containers:
        - name: installer
          image: "ghcr.io/stashed/stash-crd-installer:v0.39.1"
          args:
            - --enterprise=true
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/os: linux
